name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/README.md"
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs
        with:
          lookup-only: true

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Run workspace typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Run workspace tests
        run: pnpm test

  cluster-perf:
    name: Cluster Perf
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Create baseline worktree for pull requests
        if: ${{ github.event_name == 'pull_request' }}
        run: git worktree add --detach "$RUNNER_TEMP/cluster-perf-base" "${{ github.event.pull_request.base.sha }}"

      - name: Copy large cluster perf fixture into baseline worktree
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          cp packages/api-core/src/cluster/perf-large.json "$RUNNER_TEMP/cluster-perf-base/packages/api-core/src/cluster/perf-baseline.json"
          cp packages/api-core/src/cluster/perf.integration.ts "$RUNNER_TEMP/cluster-perf-base/packages/api-core/src/cluster/perf.integration.ts"

      - name: Install dependencies for baseline worktree
        if: ${{ github.event_name == 'pull_request' }}
        working-directory: ${{ runner.temp }}/cluster-perf-base
        run: pnpm install --frozen-lockfile

      - name: Run baseline exact cluster perf
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GHCRAWL_CLUSTER_PERF_IGNORE_THRESHOLD: 1
          GHCRAWL_CLUSTER_PERF_OUTPUT_PATH: ${{ runner.temp }}/cluster-perf-base-exact.json
        working-directory: ${{ runner.temp }}/cluster-perf-base
        run: pnpm test:cluster-perf

      - name: Run PR head exact cluster perf
        env:
          GHCRAWL_CLUSTER_PERF_CONFIG_PATH: ${{ github.workspace }}/packages/api-core/src/cluster/perf-large.json
          GHCRAWL_CLUSTER_PERF_OUTPUT_PATH: ${{ runner.temp }}/cluster-perf-head-exact.json
        run: pnpm test:cluster-perf

      - name: Run PR head vectorlite cluster perf
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GHCRAWL_CLUSTER_PERF_BACKEND: vectorlite
          GHCRAWL_CLUSTER_PERF_CONFIG_PATH: ${{ github.workspace }}/packages/api-core/src/cluster/perf-large.json
          GHCRAWL_CLUSTER_PERF_IGNORE_THRESHOLD: 1
          GHCRAWL_CLUSTER_PERF_OUTPUT_PATH: ${{ runner.temp }}/cluster-perf-head-vectorlite.json
        run: |
          for attempt in 1 2 3; do
            echo "Vectorlite perf attempt ${attempt}/3"
            pnpm test:cluster-perf
          done

      - name: Build combined cluster perf report
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          BASE_REPORT_PATH: ${{ runner.temp }}/cluster-perf-base-exact.json
          HEAD_EXACT_REPORT_PATH: ${{ runner.temp }}/cluster-perf-head-exact.json
          HEAD_VECTORLITE_REPORT_PATH: ${{ runner.temp }}/cluster-perf-head-vectorlite.json
          COMBINED_REPORT_PATH: ${{ runner.temp }}/cluster-perf.json
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          function readReport(path) {
            if (!path || !fs.existsSync(path)) {
              return null;
            }
            return JSON.parse(fs.readFileSync(path, 'utf8'));
          }

          function formatDurationMs(durationMs) {
            if (!Number.isFinite(durationMs)) return 'n/a';
            if (durationMs < 1000) return `${durationMs.toFixed(1)} ms`;
            const totalSeconds = durationMs / 1000;
            if (totalSeconds < 60) return `${totalSeconds.toFixed(2)} s`;
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds - minutes * 60;
            return `${minutes}m ${seconds.toFixed(1)}s`;
          }

          function formatPercent(value) {
            const sign = value > 0 ? '+' : '';
            return `${sign}${value.toFixed(1)}%`;
          }

          const eventName = process.env.GH_EVENT_NAME;
          const base = readReport(process.env.BASE_REPORT_PATH);
          const headExact = readReport(process.env.HEAD_EXACT_REPORT_PATH);
          const headVectorlite = readReport(process.env.HEAD_VECTORLITE_REPORT_PATH);

          if (!headExact) {
            throw new Error('Missing PR/head exact cluster perf report');
          }

          const lines = [
            '## Cluster Performance',
            '',
            `- Fixture shape: ${headExact.result.threadCount} threads x ${headExact.result.sourceKinds.length} source kinds`,
            `- Head exact fixture median (full-run): ${formatDurationMs(headExact.result.medianMs)}`,
            `- Head exact projected openclaw/openclaw: ${formatDurationMs(headExact.result.projectedOpenclawMs)}`,
          ];

          if (eventName === 'pull_request' && base) {
            const exactDeltaMs = headExact.result.medianMs - base.result.medianMs;
            const exactDeltaPercent = base.result.medianMs > 0 ? (exactDeltaMs / base.result.medianMs) * 100 : 0;
            const exactProjectedDeltaMs = headExact.result.projectedOpenclawMs - base.result.projectedOpenclawMs;
            const exactProjectedDeltaPercent =
              base.result.projectedOpenclawMs > 0 ? (exactProjectedDeltaMs / base.result.projectedOpenclawMs) * 100 : 0;
            lines.push(
              `- Base exact fixture median (full-run): ${formatDurationMs(base.result.medianMs)}`,
              `- Exact delta vs base: ${formatDurationMs(exactDeltaMs)} (${formatPercent(exactDeltaPercent)})`,
              `- Base exact projected openclaw/openclaw: ${formatDurationMs(base.result.projectedOpenclawMs)}`,
              `- Exact projected delta vs base: ${formatDurationMs(exactProjectedDeltaMs)} (${formatPercent(exactProjectedDeltaPercent)})`,
            );
          }

          if (headVectorlite) {
            const vectorliteDeltaMs = headVectorlite.result.medianMs - headExact.result.medianMs;
            const vectorliteDeltaPercent =
              headExact.result.medianMs > 0 ? (vectorliteDeltaMs / headExact.result.medianMs) * 100 : 0;
            const vectorliteProjectedDeltaMs = headVectorlite.result.projectedOpenclawMs - headExact.result.projectedOpenclawMs;
            const vectorliteProjectedDeltaPercent =
              headExact.result.projectedOpenclawMs > 0 ? (vectorliteProjectedDeltaMs / headExact.result.projectedOpenclawMs) * 100 : 0;
            lines.push(
              '',
              `- Head vectorlite fixture median (post-index, run 3/3): ${formatDurationMs(headVectorlite.result.medianMs)}`,
              `- Vectorlite delta vs head exact: ${formatDurationMs(vectorliteDeltaMs)} (${formatPercent(vectorliteDeltaPercent)})`,
              `- Head vectorlite projected openclaw/openclaw: ${formatDurationMs(headVectorlite.result.projectedOpenclawMs)}`,
              `- Vectorlite projected delta vs head exact: ${formatDurationMs(vectorliteProjectedDeltaMs)} (${formatPercent(vectorliteProjectedDeltaPercent)})`,
            );
          }

          lines.push('', '### Raw Runs', '', '#### Head Exact', '', headExact.summary);
          if (eventName === 'pull_request' && base) {
            lines.push('', '#### Base Exact', '', base.summary);
          }
          if (headVectorlite) {
            lines.push('', '#### Head Vectorlite', '', headVectorlite.summary);
          }

          const summary = `${lines.join('\n')}\n`;
          fs.writeFileSync(
            process.env.COMBINED_REPORT_PATH,
            JSON.stringify(
              {
                status: 'PASS',
                summary,
                reports: {
                  baseExact: base,
                  headExact,
                  headVectorlite,
                },
              },
              null,
              2,
            ) + '\n',
          );

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          if (summaryPath) {
            fs.appendFileSync(summaryPath, summary);
          }
          EOF

      - name: Upload cluster performance report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cluster-perf-report
          path: |
            ${{ runner.temp }}/cluster-perf.json
            ${{ runner.temp }}/cluster-perf-base-exact.json
            ${{ runner.temp }}/cluster-perf-head-exact.json
            ${{ runner.temp }}/cluster-perf-head-vectorlite.json
          if-no-files-found: ignore

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Verify non-interactive doctor JSON
        run: pnpm health

      - name: Print installed-bin usage from bin shim
        run: node ./apps/cli/bin/ghcrawl.js --help

      - name: Verify root passthrough usage
        run: pnpm cli --help

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js and dependencies
        uses: ./.github/actions/configure-nodejs

      - name: Pack and install publishable workspace packages
        run: pnpm pack:smoke
