spec_name: vectorlite-clustering
started_at: "2026-03-29T00:00:00Z"
goal: >
  Replace in-memory exact kNN with vectorlite ANN + post-processing.
  Target: >=50% cluster membership (threads in multi-member clusters / total threads).
  Constraint: no mega-clusters (max cluster size capped).

baseline:
  timestamp: "2026-03-29"
  params: { backend: vectorlite, k: 6, min_score: 0.82, candidate_k: 96, cluster_mode: basic }
  metrics:
    multi_member_pct: 31.37
    edge_count: 6934
    cluster_count: 14338
    solo_clusters: 12708
    threads_in_multi: 5808
    total_threads: 18516
    max_cluster_size: 619
    avg_multi_size: 3.56
    duration_ms: 129190

experiments:
  - id: 1
    description: "Lower threshold to 0.75 (no refinement)"
    params: { k: 6, min_score: 0.75, cluster_mode: basic }
    outcome: degenerate
    metrics:
      multi_member_pct: 68.64
      edge_count: 29157
      solo_clusters: 5807
      max_cluster_size: 9780  # mega-cluster — 53% of all threads
    notes: "Union-Find transitive closure creates one giant blob"

  - id: 2
    description: "Threshold 0.78 (no refinement)"
    params: { k: 6, min_score: 0.78, cluster_mode: basic }
    outcome: degenerate
    metrics:
      multi_member_pct: 53.23
      edge_count: 16400
      solo_clusters: 8660
      max_cluster_size: 4905

  - id: 3
    description: "Threshold 0.80 (no refinement)"
    params: { k: 6, min_score: 0.80, cluster_mode: basic }
    outcome: degenerate
    metrics:
      multi_member_pct: 42.0
      edge_count: 10744
      solo_clusters: 10739
      max_cluster_size: 2417

  - id: 4
    description: "Threshold 0.78 with refine mode (max=100, step=0.02)"
    params: { k: 6, min_score: 0.78, cluster_mode: refine, max_cluster_size: 100, refine_step: 0.02 }
    outcome: improved
    metrics:
      multi_member_pct: 44.58
      edge_count: 16400
      solo_clusters: 10262
      max_cluster_size: 89
      avg_multi_size: 3.77
    notes: "Refinement works but creates extra solos by splitting mega-clusters with higher thresholds"

  - id: 5
    description: "t=0.75, k=10, refine (max=100, step=0.03)"
    params: { k: 10, min_score: 0.75, cluster_mode: refine, max_cluster_size: 100, refine_step: 0.03 }
    outcome: improved
    metrics:
      multi_member_pct: 47.0
      edge_count: 34913
      solo_clusters: 9814
      max_cluster_size: 94
      avg_multi_size: 3.66

  - id: 6
    description: "t=0.75, k=10, refine (max=200, step=0.01)"
    params: { k: 10, min_score: 0.75, cluster_mode: refine, max_cluster_size: 200, refine_step: 0.01 }
    outcome: kept
    metrics:
      multi_member_pct: 52.2
      edge_count: 34913
      solo_clusters: 8850
      max_cluster_size: 164
      avg_multi_size: 4.11
      duration_ms: 156806
      cluster_build_ms: 575
    notes: "First experiment to hit 50% target"

  - id: 7
    description: "t=0.73, k=12, refine (max=200, step=0.01)"
    params: { k: 12, min_score: 0.73, cluster_mode: refine, max_cluster_size: 200, refine_step: 0.01 }
    outcome: improved
    metrics:
      multi_member_pct: 54.48
      edge_count: 54496
      solo_clusters: 8429
      max_cluster_size: 164
      avg_multi_size: 4.1

  - id: 8
    description: "t=0.73, k=10, refine (max=200, step=0.01)"
    params: { k: 10, min_score: 0.73, cluster_mode: refine, max_cluster_size: 200, refine_step: 0.01 }
    outcome: improved
    metrics:
      multi_member_pct: 54.48
      edge_count: 50621
      solo_clusters: 8429
      max_cluster_size: 164
      avg_multi_size: 4.1

  - id: 9
    description: "t=0.75, k=10, candidateK=200, refine (max=200, step=0.01)"
    params: { k: 10, min_score: 0.75, candidate_k: 200, cluster_mode: refine, max_cluster_size: 200, refine_step: 0.01 }
    outcome: no_improvement
    metrics:
      multi_member_pct: 52.2
      edge_count: 34913
      solo_clusters: 8850
      max_cluster_size: 164
    notes: "Higher candidateK did not help — ANN recall already sufficient"

  - id: 10
    description: "t=0.73, k=15, efSearch=300, refine (max=200, step=0.01)"
    params: { k: 15, min_score: 0.73, ef_search: 300, cluster_mode: refine, max_cluster_size: 200, refine_step: 0.01 }
    outcome: no_improvement
    metrics:
      multi_member_pct: 54.48
      edge_count: 59059
      solo_clusters: 8429
      max_cluster_size: 164
    notes: "More edges from higher k/efSearch but same membership — solos have NO neighbors above threshold"

  # --- Size-bounded Union-Find experiments (new algorithm) ---

  - id: 13
    description: "BOUNDED t=0.75, k=10, maxCluster=200"
    params: { k: 10, min_score: 0.75, cluster_mode: bounded, max_cluster_size: 200 }
    outcome: kept
    metrics:
      multi_member_pct: 64.47
      edge_count: 34913
      solo_clusters: 6579
      threads_in_multi: 11937
      max_cluster_size: 200
      avg_multi_size: 8.02
      cluster_build_ms: 30
    notes: "Dramatically better than refine — processes edges strongest-first, caps cluster size"

  - id: 14
    description: "BOUNDED t=0.75, k=10, maxCluster=100"
    params: { k: 10, min_score: 0.75, cluster_mode: bounded, max_cluster_size: 100 }
    outcome: kept
    metrics:
      multi_member_pct: 64.83
      edge_count: 34913
      solo_clusters: 6513
      threads_in_multi: 12003
      max_cluster_size: 100
      avg_multi_size: 7.89

  - id: 15
    description: "BOUNDED t=0.78, k=10, maxCluster=200"
    params: { k: 10, min_score: 0.78, cluster_mode: bounded, max_cluster_size: 200 }
    outcome: improved
    metrics:
      multi_member_pct: 51.69
      edge_count: 18448
      solo_clusters: 8945
      threads_in_multi: 9571
      max_cluster_size: 200
      avg_multi_size: 5.46

  - id: 16
    description: "BOUNDED t=0.73, k=10, maxCluster=200"
    params: { k: 10, min_score: 0.73, cluster_mode: bounded, max_cluster_size: 200 }
    outcome: best
    metrics:
      multi_member_pct: 72.08
      edge_count: 50621
      solo_clusters: 5169
      threads_in_multi: 13347
      max_cluster_size: 200
      avg_multi_size: 10.53
    notes: "Best overall — 72% membership with controlled cluster sizes"

  - id: 17
    description: "BOUNDED t=0.75, k=6, maxCluster=200"
    params: { k: 6, min_score: 0.75, cluster_mode: bounded, max_cluster_size: 200 }
    outcome: kept
    metrics:
      multi_member_pct: 64.46
      edge_count: 29157
      solo_clusters: 6580
      threads_in_multi: 11936
      max_cluster_size: 200
      avg_multi_size: 8.05
    notes: "k=6 vs k=10 nearly identical — solo count is threshold-driven, not k-driven"

key_learnings:
  - "Union-Find transitive closure is the root cause of mega-clusters at lower thresholds"
  - "Refine mode (raise threshold to split) creates extra solos — destructive approach"
  - "Size-bounded Union-Find (greedy strongest-first with size cap) is far superior"
  - "k and candidateK have minimal impact once threshold is set — solos have NO neighbors above threshold"
  - "efSearch has no impact — ANN recall is already good at default candidateK"
  - "The threshold is the primary lever for cluster membership percentage"
  - "Bounded mode preserves 64-72% membership vs refine mode's 52-54% at same threshold"

code_changes:
  - file: packages/api-core/src/cluster/build.ts
    changes:
      - "Added buildSizeBoundedClusters() — greedy strongest-first Union-Find with size cap"
      - "Added buildRefinedClusters() — iterative threshold-raising refinement (inferior)"
      - "Made UnionFind.find() iterative to avoid stack overflow on deep chains"
      - "Added unionBounded() with size tracking"
      - "Refactored formatClusters() as shared helper"
  - file: packages/api-core/src/service.ts
    changes:
      - "Added clusterMode, maxClusterSize, refineStep params to clusterExperiment()"
      - "Imported buildRefinedClusters and buildSizeBoundedClusters"
  - file: scripts/cluster-optimize-measure.mjs
    changes:
      - "New measurement harness script for optimization experiments"
      - "Supports all clustering params including cluster-mode"
